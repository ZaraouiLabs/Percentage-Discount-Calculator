    <script>
        function calc(isDiscount) {
            const amt = parseFloat(document.getElementById('amount').value);
            const pct = parseFloat(document.getElementById('percentage').value);
            const resDiv = document.getElementById('result');
            
            if (isNaN(amt) || isNaN(pct)) {
                resDiv.innerText = "Please enter valid numbers!";
                return;
            }
            const res = isDiscount ? amt - (amt * (pct/100)) : (amt * (pct/100));
            resDiv.innerText = isDiscount ? `Final Price: ${res.toFixed(2)}` : `Value: ${res.toFixed(2)}`;
        }
